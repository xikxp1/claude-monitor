<body class="antialiased min-h-screen w-full m-0 flex flex-col">
  <header class="sticky top-0 z-40 bg-white">
    <nav class="flex w-full items-center justify-between px-6 py-[9px]">
      <a href="/" class="z-50">
        <img src="/public/ollama.png" class="w-8" alt="Ollama">
      </a>
    </nav>
  </header>

  <div class="flex flex-1 justify-center">
    <div class="mx-auto max-w-[50rem] w-full px-6 py-10 md:py-12 lg:px-8">
      <div class="flex items-center lg:px-1 pb-5 md:pb-12">
        <div class="flex flex-col truncate underline-offset-4 w-full">
          <div class="space-x-2 items-center flex">
            <a href="/testuser" class="font-medium text-lg hover:underline">testuser</a>
          </div>
          <h2 id="header-email" class="text-neutral-800 text-sm truncate">testuser@example.com</h2>
        </div>
      </div>

      <section class="flex flex-col lg:flex-row lg:space-x-2">
        <div class="w-full">
          <div class="flex flex-col space-y-6">
            <h2 class="text-xl font-medium flex items-center space-x-2">
              <span>Cloud Usage</span>
              <span class="text-xs font-normal px-2 py-0.5 rounded-full bg-neutral-100 text-neutral-600 capitalize">pro</span>
            </h2>
            <p class="text-xs text-neutral-500 mb-4">
              Cloud models and capabilities such as web search contribute to session and weekly limits.
            </p>
            <div>
              <div class="flex justify-between mb-2">
                <span class="text-sm">Session usage</span>
                <span class="text-sm">0.1% used</span>
              </div>
              <div class="w-full border border-1 border-neutral-200 rounded-full h-2 overflow-hidden">
                <div class="h-full rounded-full bg-neutral-300" style="width: 0.1%"></div>
              </div>
              <div class="text-xs text-neutral-500 mt-1 local-time" data-time="2026-04-15T13:00:00Z" title="Wed, Apr 15, 3:00 PM">
                Resets in 4 hours
              </div>
            </div>

            <div>
              <div class="flex justify-between mb-2">
                <span class="text-sm">Weekly usage</span>
                <span class="text-sm">0% used</span>
              </div>
              <div class="w-full border border-1 border-neutral-200 rounded-full h-2 overflow-hidden">
                <div class="h-full rounded-full bg-neutral-300" style="width: 0%"></div>
              </div>
              <div class="text-xs text-neutral-500 mt-1 local-time" data-time="2026-04-20T00:00:00Z" title="Mon, Apr 20, 2:00 AM">
                Resets in 4 days
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>
</body>
